<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will Your Sativa Make You Sleepy?</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0;
  padding: 20px 16px 32px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #f8f6f1;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 28px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 4px 28px rgba(27,58,47,0.10);
}
.label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #c8a951;
  margin-bottom: 8px;
}
.headline {
  font-size: 1.45rem;
  font-weight: 700;
  color: #1b3a2f;
  line-height: 1.25;
  margin-bottom: 8px;
}
.subhead {
  font-size: 0.88rem;
  color: #777;
  line-height: 1.55;
  margin-bottom: 24px;
}
.progress-track {
  background: #e6ede9;
  border-radius: 99px;
  height: 5px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #1b3a2f;
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
  width: 0%;
}
.q-meta {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #1b3a2f;
  opacity: 0.45;
  margin-bottom: 10px;
}
.q-text {
  font-size: 1.05rem;
  font-weight: 600;
  color: #1b3a2f;
  line-height: 1.4;
  margin-bottom: 20px;
}
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  background: #f0f5f2;
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 13px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 13px;
  text-align: left;
  font-family: inherit;
  transition: background 0.16s, border-color 0.16s, transform 0.12s;
}
.opt:hover { background: #deeae3; border-color: #1b3a2f; transform: translateY(-1px); }
.opt.chosen { background: #1b3a2f; border-color: #1b3a2f; }
.opt-icon { font-size: 1.25rem; width: 26px; flex-shrink: 0; text-align: center; }
.opt-label { font-size: 0.93rem; font-weight: 600; color: #1b3a2f; line-height: 1.25; }
.opt.chosen .opt-label { color: #fff; }
.opt-sub { font-size: 0.78rem; color: #888; margin-top: 2px; font-weight: 400; }
.opt.chosen .opt-sub { color: rgba(255,255,255,0.65); }

/* Result */
.result { display: none; animation: rise 0.4s cubic-bezier(.4,0,.2,1); }
@keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.result-emoji { font-size: 2.6rem; text-align: center; margin-bottom: 14px; }
.badge {
  display: inline-block;
  padding: 4px 13px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.badge-sleepy  { background: #ede0f5; color: #5a3a7a; }
.badge-charged { background: #ddf0e6; color: #1b5a36; }
.badge-mixed   { background: #f5eddb; color: #7a5a1b; }
.result-title { font-size: 1.25rem; font-weight: 700; color: #1b3a2f; line-height: 1.3; margin-bottom: 10px; }
.result-body { font-size: 0.9rem; color: #555; line-height: 1.65; margin-bottom: 18px; }
.result-tip {
  background: #f0f5f2;
  border-left: 3px solid #1b3a2f;
  border-radius: 0 10px 10px 0;
  padding: 12px 15px;
  font-size: 0.85rem;
  color: #1b3a2f;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 22px;
}
.shop-btn {
  display: block;
  width: 100%;
  background: #1b3a2f;
  color: #fff;
  border-radius: 12px;
  padding: 14px 20px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  margin-bottom: 10px;
  transition: background 0.18s, transform 0.12s;
}
.shop-btn:hover { background: #163024; transform: translateY(-1px); }
  width: 100%;
  background: transparent;
  border: 2px solid #1b3a2f;
  color: #1b3a2f;
  border-radius: 12px;
  padding: 13px 20px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.18s, color 0.18s;
}
.again-btn:hover { background: #1b3a2f; color: #fff; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Quick Check</div>
  <div class="headline">Will Your Sativa Make You Sleepy?</div>
  <div class="subhead">3 questions. Predict your experience before you consume.</div>

  <div class="progress-track"><div class="progress-fill" id="bar"></div></div>

  <div id="quizPanel">
    <div class="q-meta" id="qMeta"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optGrid"></div>
  </div>

  <div class="result" id="resultPanel">
    <div class="result-emoji" id="rEmoji"></div>
    <span class="badge" id="rBadge"></span>
    <div class="result-title" id="rTitle"></div>
    <div class="result-body" id="rBody"></div>
    <div class="result-tip" id="rTip"></div>
    <a class="shop-btn" id="rShopBtn" href="#" target="_blank"></a>
    <button class="again-btn" id="againBtn">↩ Try Again</button>
  </div>
</div>

<script>
var questions = [
  {
    text: "What's the dominant terpene in your product?",
    opts: [
      { icon:"🌿", label:"Myrcene", sub:"Earthy, musky, herbal scent", val:"myrcene" },
      { icon:"🍋", label:"Limonene or Pinene", sub:"Citrus or fresh pine scent", val:"energizing" },
      { icon:"🪷", label:"Linalool", sub:"Floral or lavender scent", val:"linalool" },
      { icon:"❓", label:"Not sure / no COA", sub:"Label just says \"sativa\"", val:"unknown" }
    ]
  },
  {
    text: "How much are you planning to consume?",
    opts: [
      { icon:"🌱", label:"A little", sub:"Smaller than usual amount", val:"low" },
      { icon:"💨", label:"My usual amount", sub:"What I typically go with", val:"moderate" },
      { icon:"🔥", label:"More than usual", sub:"A heavier session", val:"high" }
    ]
  },
  {
    text: "How are you consuming it?",
    opts: [
      { icon:"🌬️", label:"Flower or vape", sub:"Effects in minutes, fades in 1–4 hrs", val:"inhale" },
      { icon:"🍬", label:"Edible or capsule", sub:"Kicks in at 45–90 min, lasts 6–8 hrs", val:"edible" }
    ]
  }
];

var outcomes = {
  sleepy: {
    emoji:"😴", badgeClass:"badge-sleepy", badge:"Likely Sleepy",
    title:"This one's probably going to slow you down.",
    body:"The combination you've described points toward a sedating experience — regardless of the sativa label. Myrcene-dominant products, higher amounts, and edibles all push in the same direction.",
    tip:"💡 Next time, look for products with limonene or pinene above 0.5% on the COA. Those terpenes lean energizing.",
    url:"https://mood.com/shop/product-mood?filter=sleepy", btnLabel:"Shop Sleepy Products"
  },
  charged: {
    emoji:"⚡", badgeClass:"badge-charged", badge:"Likely Energizing",
    title:"You're set up for an uplifting experience.",
    body:"Energizing terpenes, a lighter amount, and an inhalable format are the trifecta for staying on the right side of the biphasic curve. You've got the recipe for what sativa is actually supposed to feel like.",
    tip:"💡 Start low and stay there — the difference between energized and crashed is often just one puff.",
    url:"https://mood.com/shop/product-mood?filter=energized", btnLabel:"Shop Energized Products"
  },
  mixed: {
    emoji:"🌥️", badgeClass:"badge-mixed", badge:"Could Go Either Way",
    title:"Your experience is harder to call.",
    body:"Some factors here point toward energy, others toward relaxation. Terpene profile and individual tolerance will ultimately decide which way it goes.",
    tip:"💡 Pull up the COA before your next purchase. The top three terpenes tell you more than any strain name.",
    url:"https://mood.com/shop/product-mood?filter=classic", btnLabel:"Shop Classic Products"
  }
};

var step = 0;
var answers = [];

function render() {
  var q = questions[step];
  document.getElementById("qMeta").textContent = "Question " + (step+1) + " of " + questions.length;
  document.getElementById("qText").textContent = q.text;
  document.getElementById("bar").style.width = ((step / questions.length) * 100) + "%";

  var grid = document.getElementById("optGrid");
  grid.innerHTML = "";
  q.opts.forEach(function(o) {
    var btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML =
      '<span class="opt-icon">' + o.icon + '</span>' +
      '<div><div class="opt-label">' + o.label + '</div>' +
      '<div class="opt-sub">' + o.sub + '</div></div>';
    btn.addEventListener("click", function() { pick(o.val, btn); });
    grid.appendChild(btn);
  });
}

function pick(val, btn) {
  document.querySelectorAll(".opt").forEach(function(b){ b.classList.remove("chosen"); });
  btn.classList.add("chosen");
  answers.push(val);
  setTimeout(function() {
    if (step < questions.length - 1) { step++; render(); }
    else { showResult(); }
  }, 300);
}

function score() {
  var t = answers[0], a = answers[1], f = answers[2];
  var s = 0;
  if (t === "myrcene")   s += 2;
  if (t === "linalool")  s += 1;
  if (t === "unknown")   s += 1;
  if (a === "high")      s += 2;
  if (a === "moderate")  s += 1;
  if (f === "edible")    s += 2;
  if (s >= 4) return "sleepy";
  if (s <= 1) return "charged";
  return "mixed";
}

function showResult() {
  document.getElementById("bar").style.width = "100%";
  document.getElementById("quizPanel").style.display = "none";
  var r = outcomes[score()];
  document.getElementById("rEmoji").textContent = r.emoji;
  var badge = document.getElementById("rBadge");
  badge.textContent = r.badge;
  badge.className = "badge " + r.badgeClass;
  document.getElementById("rTitle").textContent = r.title;
  document.getElementById("rBody").textContent = r.body;
  document.getElementById("rTip").textContent = r.tip;
  var shopBtn = document.getElementById("rShopBtn");
  shopBtn.href = r.url;
  shopBtn.textContent = r.btnLabel + " →";
  var panel = document.getElementById("resultPanel");
  panel.style.display = "block";
}

document.getElementById("againBtn").addEventListener("click", function() {
  step = 0; answers = [];
  document.getElementById("resultPanel").style.display = "none";
  document.getElementById("quizPanel").style.display = "block";
  render();
});

render();
</script>
</body>
</html>
